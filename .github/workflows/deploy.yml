name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject APPS_SCRIPT_URL and Cache Buster
        run: |
          if [ -z "${{ secrets.APPS_SCRIPT_URL }}" ]; then
            echo "Error: APPS_SCRIPT_URL secret is not set!"
            exit 1
          fi
          
          # 1. 注入真實 GAS URL (使用更強健的搜索模式)
          sed -i "s|const APPS_SCRIPT_URL = .*|const APPS_SCRIPT_URL = '${{ secrets.APPS_SCRIPT_URL }}';|g" index.html
          
          # 2. 加入 Cache Buster 邏輯
          sed -i "s|url + '?' + qs|url + '?' + qs + '\&v=' + Date.now()|g" index.html
          
          # 3. 更新提示文字
          sed -i "s|APPS_SCRIPT_URL 環境變數已在 Vercel 設定|APPS_SCRIPT_URL 已透過 GitHub Action 注入|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
