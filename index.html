<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會議室預約系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4f8; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* Sidebar */
    .sidebar { width: 220px; min-height: 100vh; background: #1e293b; color: white; flex-shrink: 0; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer;
      border-radius: 8px; margin: 2px 8px; transition: all .15s; font-size: 14px; font-weight: 500; }
    .nav-item:hover { background: rgba(255,255,255,.1); }
    .nav-item.active { background: #3b82f6; }
    .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }

    /* Grid */
    .booking-grid { display: grid; overflow: auto; }
    .grid-cell {
      min-height: 32px; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0;
      position: relative; cursor: pointer; transition: background .1s;
    }
    .grid-cell:hover { background: #eff6ff; }
    .grid-cell.lunch { background: #f8fafc; cursor: default; }
    .grid-cell.lunch:hover { background: #f8fafc; }
    .grid-cell.booked { cursor: pointer; }
    .time-label {
      font-size: 11px; color: #64748b; text-align: right; padding: 7px 8px 0 0;
      border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; background: white;
      white-space: nowrap; min-height: 32px;
    }
    .day-header {
      background: white; border-right: 1px solid #e2e8f0; border-bottom: 2px solid #e2e8f0;
      padding: 8px 4px; text-align: center; font-weight: 600; font-size: 13px;
      position: sticky; top: 0; z-index: 10;
    }
    .day-header.today { background: #eff6ff; color: #2563eb; }
    .corner-cell {
      background: white; border-right: 1px solid #e2e8f0; border-bottom: 2px solid #e2e8f0;
      position: sticky; top: 0; left: 0; z-index: 20;
    }

    /* Booking bar */
    .booking-bar {
      position: absolute; inset: 1px; border-radius: 4px;
      padding: 3px 6px; font-size: 11px; font-weight: 600;
      overflow: hidden; cursor: pointer; z-index: 5;
      display: flex; flex-direction: column; justify-content: center;
      border-left: 3px solid rgba(0,0,0,.2);
      transition: opacity .15s, transform .15s;
      line-height: 1.3;
    }
    .booking-bar:hover { opacity: .9; transform: scale(1.01); }
    .booking-bar .bk-topic { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .booking-bar .bk-user { font-size: 10px; opacity: .8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Span booking (multi-cell) */
    .span-container { position: relative; }

    /* Room tags */
    .room-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; border: 2px solid transparent; }
    .room-tag:hover { transform: translateY(-1px); }
    .room-tag.selected { border-color: rgba(0,0,0,.25); box-shadow: 0 2px 8px rgba(0,0,0,.15); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: white; border-radius: 16px; max-width: 480px; width: 100%;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-body { padding: 16px 24px; }
    .modal-footer { padding: 0 24px 20px; display: flex; gap: 8px; justify-content: flex-end; }

    /* Form */
    .form-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; display: block; }
    .form-input {
      width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 9px 12px;
      font-size: 14px; font-family: inherit; transition: border-color .15s;
      outline: none; color: #1f2937;
    }
    .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.1); }

    /* Buttons */
    .btn { padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: all .15s; font-family: inherit; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: #6b7280; border: 1.5px solid #e5e7eb; }
    .btn-ghost:hover { background: #f9fafb; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* Badge */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px;
      font-size: 11px; font-weight: 600; }

    /* Card */
    .card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

    /* Stats card */
    .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    .stat-number { font-size: 32px; font-weight: 700; color: #1e293b; }
    .stat-label { font-size: 12px; color: #64748b; font-weight: 500; margin-top: 4px; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 200;
      background: #1e293b; color: white; padding: 12px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,.3);
      transform: translateY(100px); opacity: 0; transition: all .3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }

    /* Login */
    .login-card { background: white; border-radius: 20px; padding: 40px; width: 100%;
      max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }

    /* Report chart bar */
    .chart-bar { height: 20px; border-radius: 4px; min-width: 4px; transition: width .5s; }

    /* Print */
    @media print {
      .sidebar, .no-print { display: none !important; }
      .main-content { margin-left: 0 !important; }
    }

    /* Transition */
    .fade-in { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Drag select */
    .selecting { background: #bfdbfe !important; }

    /* Weekend dim */
    .day-header.weekend { color: #94a3b8; background: #f8fafc; }
    .grid-cell.weekend { background: #fafafa; }
    .grid-cell.weekend:hover { background: #f1f5f9; }

    /* Loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- LOADING VIEW -->
<div id="loadingView" style="display:flex; position:fixed; inset:0; background:#f0f4f8; z-index:300; align-items:center; justify-content:center; flex-direction:column; gap:16px;">
  <div id="loadingSpinner" style="width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  <div style="font-size:14px;color:#64748b;font-weight:500;">連接 Google Sheets 中...</div>
  <div id="loadingError" style="display:none;padding:16px 24px;background:white;border-radius:12px;border:1px solid #fecaca;color:#dc2626;font-size:13px;text-align:center;max-width:340px;line-height:1.6;">
    <div style="font-size:24px;margin-bottom:8px;">⚠️</div>
    無法連接到 Google Sheets。<br>
    請確認 <strong>APPS_SCRIPT_URL</strong> 環境變數已在 Vercel 設定，<br>並重新部署後再試。
  </div>
</div>

<!-- LOGIN VIEW -->
<div id="loginView" style="display:none; min-height:100vh; background:linear-gradient(135deg,#1e3a8a,#1e40af,#3b82f6); align-items:center; justify-content:center;">
  <div class="login-card fade-in">
    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:40px; margin-bottom:8px;">🏢</div>
      <h1 style="font-size:22px; font-weight:700; color:#1e293b;">會議室預約系統</h1>
      <p style="font-size:13px; color:#64748b; margin-top:6px;">Meeting Room Booking System</p>
    </div>
    <div style="margin-bottom:16px;">
      <label class="form-label">帳號（Email）</label>
      <input id="loginEmail" class="form-input" type="email" placeholder="your@email.com" value="">
    </div>
    <div style="margin-bottom:24px;">
      <label class="form-label">密碼</label>
      <input id="loginPassword" class="form-input" type="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" style="width:100%; padding:12px;" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="appView" style="display:none; min-height:100vh;">

  <!-- Sidebar -->
  <div class="sidebar" style="display:flex; flex-direction:column;">
    <div style="padding:20px 16px 12px;">
      <div style="font-size:16px; font-weight:700; color:white;">🏢 會議室系統</div>
      <div style="font-size:11px; color:#94a3b8; margin-top:2px;" id="currentDateLabel"></div>
    </div>
    <nav style="flex:1; padding:8px 0;">
      <div class="nav-item active" id="nav-book" onclick="switchView('book')">
        <span class="icon">📅</span> 預約會議室
      </div>
      <div class="nav-item" id="nav-overview" onclick="switchView('overview')">
        <span class="icon">🗓</span> 今日總覽
      </div>
      <div class="nav-item" id="nav-mybookings" onclick="switchView('mybookings')">
        <span class="icon">📋</span> 我的預約
      </div>
      <div class="nav-item" id="nav-report" onclick="switchView('report')">
        <span class="icon">📊</span> 統計報表
      </div>
      <div class="nav-item" id="nav-admin" onclick="switchView('admin')" style="display:none;">
        <span class="icon">⚙️</span> 帳號管理
      </div>
    </nav>
    <div style="padding:12px 16px; border-top:1px solid rgba(255,255,255,.1);">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <div style="width:32px;height:32px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;" id="userAvatar">U</div>
        <div>
          <div style="font-size:13px; font-weight:600;" id="userName">使用者</div>
          <div style="font-size:11px; color:#94a3b8;" id="userEmail">-</div>
        </div>
      </div>
      <button class="btn btn-ghost" style="width:100%;color:#94a3b8;border-color:#334155;font-size:12px;" onclick="doLogout()">登出</button>
    </div>
  </div>

  <!-- Main Content -->
  <div style="flex:1; overflow:auto; padding:24px;" id="mainContent">
    <!-- Dynamic content rendered here -->
  </div>
</div>

<!-- BOOKING MODAL -->
<div id="bookingModal" class="modal-overlay" style="display:none;" onclick="closeModalOutside(event)">
  <div class="modal-box fade-in" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <h3 style="font-size:17px;font-weight:700;color:#1e293b;" id="modalTitle">新增預約</h3>
        <p style="font-size:12px;color:#64748b;margin-top:3px;" id="modalSubtitle"></p>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;padding:4px;">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editBookingId">
      <div style="margin-bottom:14px;">
        <label class="form-label">會議主題 <span style="color:#ef4444">*</span></label>
        <input id="bkTopic" class="form-input" type="text" placeholder="請輸入會議主題">
      </div>
      <div style="margin-bottom:14px;">
        <label class="form-label">申請人 <span style="color:#ef4444">*</span></label>
        <input id="bkApplicant" class="form-input" type="text" placeholder="請輸入申請人姓名">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div>
          <label class="form-label">日期</label>
          <input id="bkDate" class="form-input" type="date">
        </div>
        <div>
          <label class="form-label">會議室</label>
          <select id="bkRoom" class="form-input" onchange="updateRoomInfo()">
            <optgroup label="實體會議室 - 3樓">
              <option value="3f-large">3F 大會議室</option>
              <option value="3f-medium">3F 中會議室</option>
            </optgroup>
            <optgroup label="實體會議室 - 13樓">
              <option value="13f-mobile">13F 行動會議室 (8人)</option>
              <option value="13f-large">13F 大會議室</option>
              <option value="13f-broadcast">13F 直播室</option>
            </optgroup>
            <optgroup label="實體會議室 - 15樓">
              <option value="15f-classroom">15F 大教室</option>
            </optgroup>
            <optgroup label="ZOOM 線上會議室">
              <option value="zoom-00">ZOOM_00 (100人)</option>
              <option value="zoom-01">ZOOM_01 (300人)</option>
              <option value="zoom-02">ZOOM_02 (100人)</option>
            </optgroup>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div>
          <label class="form-label">開始時間</label>
          <select id="bkStart" class="form-input" onchange="checkConflictPreview()"></select>
        </div>
        <div>
          <label class="form-label">結束時間</label>
          <select id="bkEnd" class="form-input" onchange="checkConflictPreview()"></select>
        </div>
      </div>
      <div style="margin-bottom:14px;">
        <label class="form-label">備註（選填）</label>
        <textarea id="bkNote" class="form-input" rows="2" placeholder="其他備註說明" style="resize:none;"></textarea>
      </div>
      <div id="conflictWarning" style="display:none; padding:10px 12px; background:#fef2f2; border:1px solid #fecaca; border-radius:8px; font-size:12px; color:#dc2626; margin-bottom:10px;"></div>
      <div id="roomInfoBar" style="padding:10px 12px; background:#f0f9ff; border:1px solid #bae6fd; border-radius:8px; font-size:12px; color:#0369a1;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="deleteBookingBtn" onclick="deleteBooking()" style="display:none;">刪除</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveBooking()">儲存預約</button>
    </div>
  </div>
</div>

<!-- BOOKING DETAIL MODAL -->
<div id="detailModal" class="modal-overlay" style="display:none;" onclick="closeDetailModalOutside(event)">
  <div class="modal-box fade-in" onclick="event.stopPropagation()" style="max-width:400px;">
    <div class="modal-header">
      <h3 style="font-size:17px;font-weight:700;color:#1e293b;">預約詳情</h3>
      <button onclick="closeDetailModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;padding:4px;">✕</button>
    </div>
    <div class="modal-body" id="detailContent"></div>
    <div class="modal-footer" id="detailActions"></div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS & DATA
// ============================================================
const ROOMS = [
  { id:'3f-large',      name:'大會議室',     floor:'3F',   type:'physical', capacity:null,  color:'#3b82f6', bg:'#dbeafe' },
  { id:'3f-medium',     name:'中會議室',     floor:'3F',   type:'physical', capacity:null,  color:'#06b6d4', bg:'#cffafe' },
  { id:'13f-mobile',    name:'行動會議室',   floor:'13F',  type:'physical', capacity:8,     color:'#8b5cf6', bg:'#ede9fe' },
  { id:'13f-large',     name:'大會議室',     floor:'13F',  type:'physical', capacity:null,  color:'#6366f1', bg:'#e0e7ff' },
  { id:'13f-broadcast', name:'直播室',       floor:'13F',  type:'physical', capacity:null,  color:'#ec4899', bg:'#fce7f3' },
  { id:'15f-classroom', name:'大教室',       floor:'15F',  type:'physical', capacity:null,  color:'#f59e0b', bg:'#fef3c7' },
  { id:'zoom-00',       name:'ZOOM_00',      floor:'ZOOM', type:'zoom',     capacity:100,   color:'#10b981', bg:'#d1fae5' },
  { id:'zoom-01',       name:'ZOOM_01',      floor:'ZOOM', type:'zoom',     capacity:300,   color:'#059669', bg:'#a7f3d0' },
  { id:'zoom-02',       name:'ZOOM_02',      floor:'ZOOM', type:'zoom',     capacity:100,   color:'#0d9488', bg:'#ccfbf1' },
];

const TIME_SLOTS = [
  '08:30','09:00','09:30','10:00','10:30','11:00','11:30',
  'LUNCH',
  '13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30'
];

const WEEKDAYS = ['一','二','三','四','五'];

// ============================================================
// STATE
// ============================================================
let state = {
  currentUser: null,
  currentView: 'book',
  currentWeekStart: null, // Monday of selected week
  selectedRoom: '3f-large',
  bookings: [],
  users: [],
};

// ============================================================
// API (Google Sheets via /api/sheets proxy)
// ============================================================
async function apiCall(params) {
  const qs = new URLSearchParams(params).toString();
  const r = await fetch('/api/sheets?' + qs);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const json = await r.json();
  if (json.error) throw new Error(json.error);
  return json;
}

function normalizeRow(obj) {
  // Google Sheets 可能將數字欄位轉為 number，確保全部為 string
  const out = {};
  for (const k in obj) out[k] = (obj[k] === null || obj[k] === undefined) ? '' : String(obj[k]);
  return out;
}

async function loadData() {
  const data = await apiCall({ action: 'getAll' });
  state.bookings = (data.bookings || []).map(normalizeRow);
  state.users    = (data.users    || []).map(normalizeRow);
}

// ============================================================
// AUTH
// ============================================================
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  if (!email || !pass) { showToast('請輸入帳號與密碼','error'); return; }

  const btn = document.querySelector('#loginView .btn-primary');
  btn.disabled = true; btn.textContent = '登入中...';

  try {
    // 密碼在 Apps Script 伺服器端比對，不送到瀏覽器
    const result = await apiCall({ action: 'login', email, password: pass });
    if (!result.success) { showToast(result.error || '帳號或密碼錯誤','error'); return; }
    state.currentUser = result.user;
    sessionStorage.setItem('mrb_session', JSON.stringify(result.user));
    startApp();
  } catch(e) {
    showToast('登入失敗：' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '登入';
  }
}
function doLogout() {
  state.currentUser = null;
  sessionStorage.removeItem('mrb_session');
  document.getElementById('appView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
}
function checkSession() {
  const s = sessionStorage.getItem('mrb_session');
  if (s) { state.currentUser = JSON.parse(s); return true; }
  return false;
}
function startApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'flex';
  document.getElementById('userName').textContent = state.currentUser.name;
  document.getElementById('userEmail').textContent = state.currentUser.email;
  document.getElementById('userAvatar').textContent = state.currentUser.name.charAt(0);
  if (state.currentUser.role === 'admin') {
    document.getElementById('nav-admin').style.display = 'flex';
  }
  state.currentWeekStart = getWeekStart(new Date());
  updateDateLabel();
  switchView('book');
}

// ============================================================
// DATE UTILITIES
// ============================================================
function getWeekStart(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day; // Mon = start
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}
function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}
function fmt(d) { return d.toISOString().split('T')[0]; }
function fmtDisplay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日`;
}
function getWeekDays(weekStart) {
  return Array.from({length:5}, (_,i) => addDays(weekStart, i));
}
function isToday(dateStr) {
  return dateStr === fmt(new Date());
}
function isWeekend(d) { const day = d.getDay(); return day === 0 || day === 6; }
function getMondayStr(dateStr) { return fmt(getWeekStart(new Date(dateStr + 'T00:00:00'))); }
function updateDateLabel() {
  const now = new Date();
  document.getElementById('currentDateLabel').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
}

// ============================================================
// TIME UTILITIES
// ============================================================
function timeToMins(t) {
  if (!t || t === 'LUNCH') return NaN;
  const [h,m] = t.split(':').map(Number); return h*60+m;
}
function minsToTime(m) {
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
function getTimeSlots() { return TIME_SLOTS.filter(t => t !== 'LUNCH'); }
function slotIndex(t) { return getTimeSlots().indexOf(t); }

// Calculate grid row span accounting for the LUNCH separator row
function calcGridSpan(startTime, endTime) {
  const startIdx = TIME_SLOTS.indexOf(startTime);
  let endIdx = TIME_SLOTS.indexOf(endTime);
  if (endIdx === -1) {
    // e.g. endTime='12:00' not in TIME_SLOTS — treat it as just before LUNCH
    const lunchIdx = TIME_SLOTS.indexOf('LUNCH');
    endIdx = lunchIdx; // ends right at lunch separator
  }
  // Span = rows between startIdx and endIdx (both in TIME_SLOTS)
  if (endIdx > startIdx) return endIdx - startIdx;
  // Fallback: time-based (for afternoon-only or morning-only bookings)
  return Math.max(1, Math.round((timeToMins(endTime) - timeToMins(startTime)) / 30));
}

// Booking overlaps another?
function timesOverlap(s1,e1,s2,e2) {
  return timeToMins(s1) < timeToMins(e2) && timeToMins(e1) > timeToMins(s2);
}
function getConflicts(roomId, date, startTime, endTime, excludeId=null) {
  return state.bookings.filter(b =>
    b.roomId === roomId && b.date === date &&
    b.id !== excludeId &&
    timesOverlap(startTime, endTime, b.startTime, b.endTime)
  );
}

function renderWeekGrid(days, roomId) {
  const slots = TIME_SLOTS;
  const bookings = state.bookings.filter(b => b.roomId === roomId);

  let html = `<div style="display:grid;grid-template-columns:64px repeat(5,1fr);min-width:600px;">`;

  // Corner
  html += `<div class="corner-cell" style="height:44px;"></div>`;

  // Day headers
  days.forEach((d,i) => {
    const ds = fmt(d);
    const today = isToday(ds);
    html += `<div class="day-header ${today?'today':''}">
      <div style="font-size:11px;color:${today?'#3b82f6':'#94a3b8'};font-weight:500;">週${WEEKDAYS[i]}</div>
      <div>${d.getMonth()+1}/${d.getDate()}</div>
    </div>`;
  });

  // Rows
  slots.forEach((slot, si) => {
    if (slot === 'LUNCH') {
      html += `<div class="time-label" style="display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;color:#94a3b8;background:#f8fafc;border-right:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;min-height:24px;">午休</div>`;
      days.forEach(() => {
        html += `<div class="grid-cell lunch" style="background:#f8fafc;min-height:24px;display:flex;align-items:center;justify-content:center;"><span style="font-size:10px;color:#cbd5e1;">── 午休時間 ──</span></div>`;
      });
      return;
    }

    // Time label
    html += `<div class="time-label">${slot}</div>`;

    // Day cells
    days.forEach((d, di) => {
      const ds = fmt(d);
      // Find booking that starts at this slot
      const bk = bookings.find(b => b.date === ds && b.startTime === slot);
      if (bk) {
        // Calculate span (accounting for LUNCH separator row)
        const spans = calcGridSpan(bk.startTime, bk.endTime);
        const room = ROOMS.find(r=>r.id===roomId);
        const isOwn = state.currentUser && bk.userId === state.currentUser.id;
        html += `
          <div class="grid-cell booked" style="position:relative;grid-row:span ${spans};" onclick="showBookingDetail('${bk.id}')">
            <div class="booking-bar" style="background:${room.bg};color:${room.color};border-left-color:${room.color};">
              <div class="bk-topic">${bk.topic}</div>
              <div class="bk-user">${bk.applicant} · ${bk.startTime}~${bk.endTime}</div>
            </div>
          </div>`;
      } else {
        // Check if this slot is covered by a spanning booking
        const covered = bookings.find(b => {
          if (b.date !== ds) return false;
          if (b.startTime === slot) return false;
          return timeToMins(b.startTime) < timeToMins(slot) && timeToMins(b.endTime) > timeToMins(slot);
        });
        if (!covered) {
          html += `<div class="grid-cell" onclick="quickBook('${ds}','${slot}','${roomId}')">
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s;" class="add-hint">
              <span style="font-size:16px;color:#3b82f6;">＋</span>
            </div>
          </div>`;
        }
      }
    });
  });

  html += `</div>`;

  // Add hover effect via CSS
  html += `<style>
    .grid-cell:not(.lunch):not(.booked):hover .add-hint { opacity:1 !important; }
  </style>`;

  return html;
}

function openAddUser() {
  document.getElementById('userFormArea').style.display='block';
  document.getElementById('userFormTitle').textContent='新增帳號';
  document.getElementById('editUserId').value='';
  ['uName','uDept','uEmail','uPassword'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('uRole').value='user';
  document.getElementById('userFormArea').scrollIntoView({behavior:'smooth'});
}
function editUser(uid) {
  const u = state.users.find(x=>x.id===uid);
  if(!u) return;
  document.getElementById('userFormArea').style.display='block';
  document.getElementById('userFormTitle').textContent='編輯帳號';
  document.getElementById('editUserId').value=u.id;
  document.getElementById('uName').value=u.name;
  document.getElementById('uDept').value=u.dept||'';
  document.getElementById('uEmail').value=u.email;
  document.getElementById('uPassword').value=u.password;
  document.getElementById('uRole').value=u.role;
  document.getElementById('userFormArea').scrollIntoView({behavior:'smooth'});
}
async function saveUser() {
  const uid      = document.getElementById('editUserId').value;
  const name     = document.getElementById('uName').value.trim();
  const dept     = document.getElementById('uDept').value.trim();
  const email    = document.getElementById('uEmail').value.trim();
  const password = document.getElementById('uPassword').value;
  const role     = document.getElementById('uRole').value;

  if (!name || !email) { showToast('請填寫姓名與 Email','error'); return; }
  if (!uid && !password) { showToast('新增帳號請設定密碼','error'); return; }

  const saveBtn = document.querySelector('#userFormArea .btn-primary');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '儲存中...'; }
  try {
    if (uid) {
      // 編輯時若密碼欄空白 → 用 keepPassword 標記，Apps Script 保留原密碼
      const payload = { id: uid, name, dept, email, role,
        ...(password ? { password } : { keepPassword: true }) };
      const i = state.users.findIndex(u=>u.id===uid);
      state.users[i] = { ...state.users[i], name, dept, email, role };
      await apiCall({ action: 'editUser', data: JSON.stringify(payload) });
    } else {
      const user = { id: 'u'+Date.now(), name, dept, email, password, role };
      state.users.push(user);
      await apiCall({ action: 'addUser', data: JSON.stringify(user) });
    }
    showToast('帳號已儲存', 'success');
    renderAdminView();
  } catch(e) {
    showToast('儲存失敗：' + e.message, 'error');
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '儲存'; }
  }
}
async function deleteUser(uid) {
  if (!confirm('確定刪除此帳號？')) return;
  const prev = [...state.users];
  state.users = state.users.filter(u=>u.id!==uid);
  renderAdminView();
  try {
    await apiCall({ action: 'deleteUser', id: uid });
    showToast('帳號已刪除');
  } catch(e) {
    state.users = prev;
    showToast('刪除失敗：' + e.message, 'error');
    renderAdminView();
  }
}

function populateTimeOptions() {
  const slots = getTimeSlots();
  const starts = ['bkStart','bkEnd'];
  starts.forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = slots.map(s=>`<option value="${s}">${s}</option>`).join('');
  });
}

function openNewBooking(date=null, time=null, roomId=null) {
  populateTimeOptions();
  document.getElementById('editBookingId').value = '';
  document.getElementById('bkTopic').value = '';
  document.getElementById('bkApplicant').value = state.currentUser?.name || '';
  document.getElementById('bkDate').value = date || fmt(new Date());
  document.getElementById('bkRoom').value = roomId || state.selectedRoom;
  document.getElementById('bkNote').value = '';
  document.getElementById('bkStart').value = time || '09:00';
  // Set end time 1 hr after start
  const slots = getTimeSlots();
  const si = slots.indexOf(time || '09:00');
  document.getElementById('bkEnd').value = slots[Math.min(si+2, slots.length-1)];
  document.getElementById('modalTitle').textContent = '新增預約';
  document.getElementById('deleteBookingBtn').style.display = 'none';
  document.getElementById('conflictWarning').style.display = 'none';
  updateRoomInfo();
  setModalSubtitle();
  document.getElementById('bookingModal').style.display = 'flex';
}

function setModalSubtitle() {
  const date = document.getElementById('bkDate').value;
  const start = document.getElementById('bkStart').value;
  const end   = document.getElementById('bkEnd').value;
  const room  = ROOMS.find(r=>r.id===document.getElementById('bkRoom').value);
  if (room) {
    document.getElementById('modalSubtitle').textContent =
      `${fmtDisplay(date)} · ${start}～${end} · ${room.floor} ${room.name}`;
  }
}

function updateRoomInfo() {
  const roomId = document.getElementById('bkRoom').value;
  const room = ROOMS.find(r=>r.id===roomId);
  if (!room) return;
  document.getElementById('roomInfoBar').innerHTML =
    `<strong>${room.floor} ${room.name}</strong>${room.capacity?` — 最多容納 ${room.capacity} 人`:''}`;
  checkConflictPreview();
  setModalSubtitle();
}

function checkConflictPreview() {
  const roomId = document.getElementById('bkRoom').value;
  const date   = document.getElementById('bkDate').value;
  const start  = document.getElementById('bkStart').value;
  const end    = document.getElementById('bkEnd').value;
  const excludeId = document.getElementById('editBookingId').value;
  if (!date || !start || !end) return;
  if (timeToMins(start) >= timeToMins(end)) {
    document.getElementById('conflictWarning').style.display='block';
    document.getElementById('conflictWarning').textContent='⚠ 結束時間必須晚於開始時間';
    return;
  }
  const conflicts = getConflicts(roomId, date, start, end, excludeId);
  const warn = document.getElementById('conflictWarning');
  if (conflicts.length) {
    warn.style.display='block';
    warn.innerHTML=`⚠ 時間衝突：${conflicts.map(c=>`「${c.topic}」(${c.startTime}~${c.endTime})`).join('、')}`;
  } else {
    warn.style.display='none';
  }
  setModalSubtitle();
}

async function saveBooking() {
  const topic    = document.getElementById('bkTopic').value.trim();
  const applicant= document.getElementById('bkApplicant').value.trim();
  const date     = document.getElementById('bkDate').value;
  const roomId   = document.getElementById('bkRoom').value;
  const start    = document.getElementById('bkStart').value;
  const end      = document.getElementById('bkEnd').value;
  const note     = document.getElementById('bkNote').value.trim();
  const editId   = document.getElementById('editBookingId').value;

  if (!topic || !applicant || !date || !start || !end) {
    showToast('請填寫必要欄位','error'); return;
  }
  if (timeToMins(start) >= timeToMins(end)) {
    showToast('結束時間必須晚於開始時間','error'); return;
  }
  const conflicts = getConflicts(roomId, date, start, end, editId);
  if (conflicts.length) {
    if (!confirm(`此時段有衝突（${conflicts[0].topic}），確定仍要儲存？`)) return;
  }

  const btn = document.querySelector('#bookingModal .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '儲存中...'; }

  const prevBookings = [...state.bookings];
  try {
    if (editId) {
      const i = state.bookings.findIndex(b=>b.id===editId);
      state.bookings[i] = {...state.bookings[i], roomId, date, startTime:start, endTime:end, topic, applicant, note};
      await apiCall({ action: 'editBooking', data: JSON.stringify(state.bookings[i]) });
    } else {
      const booking = {
        id: 'b'+Date.now(), roomId, date, startTime:start, endTime:end,
        topic, applicant, userId: state.currentUser.id, note,
        createdAt: new Date().toISOString()
      };
      state.bookings.push(booking);
      await apiCall({ action: 'addBooking', data: JSON.stringify(booking) });
    }
    closeModal();
    showToast(editId?'預約已更新':'預約成功 ✓','success');
    switchView(state.currentView);
  } catch(e) {
    state.bookings = prevBookings;
    showToast('儲存失敗：' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '儲存預約'; }
  }
}

async function deleteBooking() {
  const editId = document.getElementById('editBookingId').value;
  if (!editId) return;
  if (!confirm('確定刪除此預約？')) return;
  const prev = [...state.bookings];
  state.bookings = state.bookings.filter(b=>b.id!==editId);

  closeDetailModal();

  } catch(e) {
    state.bookings = prev;
    showToast('刪除失敗：' + e.message, 'error');
    switchView(state.currentView);
  }
}

function exportCSV() {
  const rows = [['日期','開始','結束','會議室','主題','申請人','備註']];
  state.bookings
    .sort((a,b)=>(a.date+a.startTime).localeCompare(b.date+b.startTime))
    .forEach(b=>{
      const r=ROOMS.find(x=>x.id===b.roomId);
      rows.push([b.date,b.startTime,b.endTime,`${r.floor} ${r.name}`,b.topic,b.applicant,b.note||'']);
    });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `會議室預約_${fmt(new Date())}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV 已匯出','success');
}

function exportICS() {
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//會議室預約系統//TW',
    'CALSCALE:GREGORIAN',
  ];
  state.bookings.forEach(b=>{
    const r = ROOMS.find(x=>x.id===b.roomId);
    const dtStart = b.date.replace(/-/g,'')+'T'+b.startTime.replace(':','')+'00';
    const dtEnd   = b.date.replace(/-/g,'')+'T'+b.endTime.replace(':','')+'00';
    lines.push('BEGIN:VEVENT');
    lines.push(`DTSTART:${dtStart}`);
    lines.push(`DTEND:${dtEnd}`);
    lines.push(`SUMMARY:${b.topic}`);
    lines.push(`LOCATION:${r.floor} ${r.name}`);
    lines.push(`DESCRIPTION:申請人: ${b.applicant}${b.note?' | '+b.note:''}`);
    lines.push(`UID:mrb-${b.id}@system`);
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')],{type:'text/calendar'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `會議室行事曆_${fmt(new Date())}.ics`;
  a.click(); URL.revokeObjectURL(url);
  showToast('行事曆已匯出','success');
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type?' '+type:'');
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'),3000);
}

// ============================================================
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeModal(); closeDetailModal(); }
  if (e.key==='n' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA') {
    openNewBooking();
  }
});

// Enter key on login
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('loginPassword')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('loginEmail')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
});

// ============================================================
// INIT
// ============================================================
(async () => {
  try {
    await loadData();
  } catch(e) {
    document.getElementById('loadingSpinner').style.display = 'none';
    document.getElementById('loadingError').style.display = 'block';
    return;
  }
  document.getElementById('loadingView').style.display = 'none';
  if (checkSession()) {
    startApp();
  } else {
    document.getElementById('loginView').style.display = 'flex';
  }
})();
</script>
</body>
